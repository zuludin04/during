name: during
description: Money tracking application

publish_to: "none"
version: 1.1.1+6

environment:
  sdk: ">=3.1.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.6
  get: ^4.6.6
  sqflite: ^2.3.0
  path: ^1.8.3
  flex_color_picker: ^3.3.0
  intl: ^0.18.1
  flutter_svg: ^2.0.7
  carousel_slider: ^4.2.1
  percent_indicator: ^4.2.3
  settings_ui: ^2.0.2
  get_storage: ^2.1.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.1.14
  share_plus: ^7.2.1
  google_mobile_ads: ^3.1.0
  collection: 1.17.2
  sliver_tools: ^0.2.12

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/category/
    - assets/navigation/

  fonts:
    - family: NotoSans
      fonts:
        - asset: fonts/NotoSansJP-Regular.otf
