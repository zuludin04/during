name: during
description: Money tracking application

publish_to: "none"
version: 1.0.1+2

environment:
  sdk: ">=2.16.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.5
  get: ^4.6.5
  sqflite: ^2.2.4+1
  path: ^1.8.1
  flex_color_picker: ^3.1.0
  intl: ^0.18.0
  flutter_svg: ^2.0.0+1
  carousel_slider: ^4.2.1
  settings_ui: ^2.0.2
  get_storage: ^2.0.3
  url_launcher: ^6.1.9
  share_plus: ^6.3.1
  google_mobile_ads: ^2.3.0
  sliver_tools: ^0.2.9
  grouped_list: ^5.1.2
  fl_chart: ^0.60.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^2.0.1
  mockito: ^5.3.2
  build_runner: ^2.3.3
  mocktail: ^0.3.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/category/
    - assets/navigation/

  fonts:
    - family: PlusJakarta
      fonts:
        - asset: fonts/PlusJakartaSans.ttf
        - asset: fonts/PlusJakartaSans-w300.ttf
          weight: 300
        - asset: fonts/PlusJakartaSans-w500.ttf
          weight: 500
        - asset: fonts/PlusJakartaSans-w700.ttf
          weight: 700
        - asset: fonts/PlusJakartaSans-w900.ttf
          weight: 900
